<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Resume — EasyResume</title>
  <meta name="description" content="Preview your resume and download it as a professionally formatted PDF.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark px-3">
    <a class="navbar-brand" href="index.html">EasyResume</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="builder.html">Build Resume</a></li>
        <li class="nav-item"><a class="nav-link active" href="preview.html">Preview Resume</a></li>
      </ul>
      <button class="btn btn-outline-light" id="themeToggle">🌙</button>
    </div>
  </nav>

  <!-- Action Buttons -->
  <div class="container mt-4 fade-in" data-html2canvas-ignore>
    <div class="preview-actions">
      <button class="btn-edit" id="editResume">← Edit Resume</button>
      <button class="btn-download" id="downloadPDF">⬇ Download PDF</button>
    </div>
  </div>

  <!-- Resume Output (this is the PDF source) -->
  <div class="container mb-5 fade-in" style="animation-delay:0.1s">
    <div id="resumeOutput">
      <!-- Header -->
      <div class="resume-header">
        <h1 id="previewName"></h1>
        <div class="designation" id="previewTitle"></div>
        <div class="resume-contact">
          <span id="contactEmail"></span>
          <span id="contactPhone"></span>
        </div>
      </div>

      <!-- Body -->
      <div class="resume-body">
        <!-- Summary -->
        <div class="resume-section" id="sectionSummary">
          <div class="resume-section-title">Professional Summary</div>
          <p class="resume-summary" id="previewSummary"></p>
        </div>

        <!-- Skills -->
        <div class="resume-section" id="sectionSkills">
          <div class="resume-section-title">Skills</div>
          <div class="resume-skills" id="previewSkills"></div>
        </div>

        <!-- Education -->
        <div class="resume-section" id="sectionEducation">
          <div class="resume-section-title">Education</div>
          <div id="previewEducation"></div>
        </div>

        <!-- Experience -->
        <div class="resume-section" id="sectionExperience">
          <div class="resume-section-title">Experience</div>
          <div id="previewExperience"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p class="mb-0">© 2025 EasyResume. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
